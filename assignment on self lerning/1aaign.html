<!-- 1. Write a jQuery program to get a single element from a selection of elements of a 
HTML page.   -->

<!DOCTYPE html>
<html>
<head>
<title>Get Single Element</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function(){
    // Select all <p> elements and get the second one
    var element = $("p").get(1);
    
    // Change its text
    $(element).css("color","red");
});
</script>
</head>

<body>
<p>Paragraph 1</p>
<p>Paragraph 2</p>
<p>Paragraph 3</p>
</body>
</html>
