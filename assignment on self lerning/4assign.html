<!-- 4. Write a jQuery program to hide all headings on a page when they are clicked. o Also 
find the position of the mouse pointer relative to the left and top edges of the 
document -->

<!DOCTYPE html>
<html>
<head>
<title>Hide Headings & Mouse Position</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function(){

    // Hide headings when clicked
    $("h1, h2, h3, h4, h5, h6").click(function(){
        $(this).hide();
    });

    // Display mouse position
    $(document).mousemove(function(event){
        $("#position").text(
            "Left: " + event.pageX + " , Top: " + event.pageY
        );
    });

});
</script>
</head>

<body>

<h1>Heading 1</h1>
<h2>Heading 2</h2>

<p id="position">Move the mouse to see position</p>

</body>
</html>
