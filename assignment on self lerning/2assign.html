<!-- 2. You are having sample data for the link. Write jQuery code to change the hyperlink 
and the text of an existing link.   -->

<!DOCTYPE html>
<html>
<head>
<title>Change Link</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function(){
    $("#myLink").attr("href","https://www.google.com");
    $("#myLink").text("Go to Google");
});
</script>
</head>

<body>
<a id="myLink" href="https://example.com">Visit Example</a>
</body>
</html>
